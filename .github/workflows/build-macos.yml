name: Build macOS Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Choose the Python version you want to target

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure PyInstaller is installed even if not in requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # --onefile: Packages everything into a single executable file.
        # --noconsole: Prevents a terminal window from opening (use only for GUI apps). Remove this flag if it is a command-line utility.
        # Change 'src/main.py' to your actual entry point path.
        pyinstaller --onefile --noconsole src/main.py

    - name: Compress Build Artifact
      run: |
        # Zipping preserves execution permissions on macOS
        cd dist
        zip -r ../macos-executable.zip main
        # Note: If your entry point is main.py, the output binary is named 'main' by default.
        # To rename it, add `--name "MyApp"` to the pyinstaller command above.

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: macos-executable.zip
        retention-days: 5

name: Build macOS GUI App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyinstaller

    - name: Build with PyInstaller (GUI / Windowed Mode)
      run: |
        # --windowed: Creates a macOS .app bundle and disables the console window
        # Replace 'app.py' with the name of your main python file
        pyinstaller --onefile --windowed src/main_menu.py

    - name: Compress App Bundle
      run: |
        cd dist
        # Zips the .app bundle to preserve macOS file permissions
        zip -r ../macos-app.zip *.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-gui-app
        path: macos-app.zip
        retention-days: 5
